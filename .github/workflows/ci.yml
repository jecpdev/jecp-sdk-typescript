name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      # The lockfile is committed for reproducibility but rollup's per-platform
      # optional deps don't survive cross-platform npm ci. Drop the lockfile
      # and let npm install resolve native binaries fresh on the runner.
      # See: github.com/npm/cli/issues/4828
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish-dry-run:
    name: publish (dry run)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # The lockfile is committed for reproducibility but rollup's per-platform
      # optional deps don't survive cross-platform npm ci. Drop the lockfile
      # and let npm install resolve native binaries fresh on the runner.
      # See: github.com/npm/cli/issues/4828
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm publish --dry-run --access public
