name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          # No `cache: npm` — we don't commit package-lock.json (rollup's
          # per-platform native deps make a single committed lockfile lie
          # to one platform or the other; see github.com/npm/cli/issues/4828).
          # Re-resolving on each run is ~5s and worth the simplicity.

      - run: npm install --no-audit --no-fund --no-package-lock

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish-dry-run:
    name: publish (dry run)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund --no-package-lock
      - run: npm run build
      - run: npm publish --dry-run --access public
